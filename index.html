<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>

    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <!-- click Message -->
    <div class="init-area">
      <div class="init-btn-container">
        <p>Click the button to download the virus!</p>
        <button class="click-btn">Click Here</button>
      </div>
    </div>

    <div class="buttons-containers hide">
      <button class="button1 button">Calculadora</button>
      <button class="button2 button">Click Me</button>
      <button class="button3 button">Test</button>
    </div>

    <div class="contenedor-calculadora contenedor hide">
      <div class="inputs1 screen">
        <p class="result">0</p>
        <p class="inputs2">0</p>
      </div>

      <!-- <div class="operations"></div> -->

      <div class="btns-container hide">
        <button class="calcBtns btn-1" data-num="1" data-type="numberKey">
          1
        </button>
        <button class="calcBtns btn-2" data-num="2" data-type="numberKey">
          2
        </button>
        <button class="calcBtns btn-3" data-num="3" data-type="numberKey">
          3
        </button>
        <button class="calcBtns btn-4" data-num="4" data-type="numberKey">
          4
        </button>
        <button class="calcBtns btn-5" data-num="5" data-type="numberKey">
          5
        </button>
        <button class="calcBtns btn-6" data-num="6" data-type="numberKey">
          6
        </button>
        <button class="calcBtns btn-7" data-num="7" data-type="numberKey">
          7
        </button>
        <button class="calcBtns btn-8" data-num="8" data-type="numberKey">
          8
        </button>
        <button class="calcBtns btn-9" data-num="9" data-type="numberKey">
          9
        </button>
        <button class="calcBtns btn-0" data-num="0" data-type="numberKey">
          0
        </button>
        <button
          class="calcBtns btn-mas"
          data-type="operator"
          data-operation="suma"
        >
          +
        </button>
        <button
          class="calcBtns btn-menos"
          data-type="operator"
          data-operation="resta"
        >
          -
        </button>
        <button
          class="calcBtns btn-por"
          data-type="operator"
          data-operation="multiplicacion"
        >
          *
        </button>
        <button
          class="calcBtns btn-division"
          data-type="operator"
          data-operation="division"
        >
          /
        </button>
        <button class="calcBtns btn-igual" data-type="igual">=</button>
        <button class="calcBtns btn-dot" data-type="punto">.</button>
        <button class="calcBtns btn-del" data-type="delete">Del</button>
        <button class="calcBtns btn-clear" data-type="borrar">C</button>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
